name: 변협 공지 자동 갱신

on:
  schedule:
    - cron: '20 21 * * *'   # UTC 21:20 = KST 06:20 (매일)
  workflow_dispatch:         # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect-notices:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 공지 수집 실행
        run: node fetch-notices.js

      - name: 변경분 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notices.json
          git diff --staged --quiet || git commit -m "공지 갱신 $(date +%F)"
          git push
