name: 판례 속보 자동 갱신

on:
  schedule:
    # UTC 21:10 == KST 06:10 (뉴스 워크플로우와 10분 차이로 분산)
    - cron: '10 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: panrye-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 판례 수집
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          OUT_FILE: data/panrye.json
        run: node fetch-panrye.js

      - name: 변경분 커밋
        run: |
          git config user.name  "panrye-bot"
          git config user.email "panrye-bot@users.noreply.github.com"
          git add data/panrye.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 판례 갱신 $(date -u +%Y-%m-%d)"
            git push
          fi
