name: Fetch Jobs

on:
  schedule:
    # 매일 KST 06:10 (UTC 21:10 전날) — news.yml과 시간 겹치지 않게 10분 뒤로
    - cron: '10 21 * * *'
  workflow_dispatch: {} # 수동 실행 버튼 (첫 테스트용)

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 채용공고 수집 실행
        env:
          JOBALIO_SERVICE_KEY: ${{ secrets.JOBALIO_SERVICE_KEY }}
          WORKNET_AUTH_KEY: ${{ secrets.WORKNET_AUTH_KEY }}
        run: node fetch-jobs.js

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: 채용공고 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
